name: Smoke test - runner and Docker access

on:
  workflow_dispatch:  # manual trigger only, for testing

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Check Python
        run: |
          python --version
          echo "Python OK"

      - name: Check Docker access
        run: |
          docker ps
          echo "Docker OK"

      - name: Check MinIO reachable
        run: |
          curl -f http://localhost:9000/minio/health/live
          echo "MinIO OK"