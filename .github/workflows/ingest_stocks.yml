name: Daily stocks ingestion

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 6:00 PM IST Mon-Fri (market close + 30min buffer)
  workflow_dispatch:          # allow manual trigger for testing

jobs:
  ingest:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ingest stock data
        working-directory: C:\Users\Asus\Desktop\Project\datagate
        run: |
          & "C:\Users\Asus\Desktop\Project\datagate\.venv\Scripts\python.exe" -m src.ingestion.stocks
          echo "Stocks ingestion complete"

      - name: Run quality gate
        working-directory: C:\Users\Asus\Desktop\Project\datagate
        run: |
          & "C:\Users\Asus\Desktop\Project\datagate\.venv\Scripts\python.exe" -m src.gate.gate
          echo "Gate run complete"

      - name: Snapshot DuckDB to GitHub
        working-directory: C:\Users\Asus\Desktop\Project\datagate
        run: |
          git config user.email "datagate-bot@pipeline.local"
          git config user.name "DataGate Bot"
          git add data/duckdb/datagate.db
          $staged = git diff --staged --name-only
          if ($staged) {
            git commit -m "auto: snapshot DuckDB after ingest $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
            git push
            echo "DuckDB snapshot pushed"
          } else {
            echo "No DuckDB changes to snapshot"
          }