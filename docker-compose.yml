version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Kolkata
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "datagate-local-secret"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: datagate
    MINIO_SECRET_KEY: datagate123
    MINIO_BUCKET_RAW: bronze
    MINIO_BUCKET_VERIFIED: bronze-verified
    MINIO_BUCKET_QUARANTINE: quarantine
    MINIO_BUCKET_ENRICHED: enriched
    DUCKDB_PATH: /opt/datagate/duckdb/datagate.db
    GEMINI_API_KEY: ${GEMINI_API_KEY}
    ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY}
    NEWSAPI_KEY: ${NEWSAPI_KEY}
    FRED_API_KEY: ${FRED_API_KEY}
    REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
    REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
    REDDIT_USER_AGENT: "datagate/0.1"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data/duckdb:/opt/datagate/duckdb
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

networks:
  datagate-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  airflow-logs:

services:

  postgres:
    image: postgres:15-alpine
    container_name: datagate-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - datagate-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: datagate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: datagate
      MINIO_ROOT_PASSWORD: datagate123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - datagate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: datagate-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - datagate-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 datagate datagate123;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/bronze-verified;
      mc mb --ignore-existing local/quarantine;
      mc mb --ignore-existing local/enriched;
      echo 'MinIO setup complete';
      exit 0;
      "
    restart: "no"
  # -------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper needed)
  # UI available via kafka-ui at http://localhost:8090
  # Bootstrap server: localhost:9092
  # -------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: datagate-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "9092:9092"
    networks:
      - datagate-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
  # -------------------------------------------------------------------------
  # Kafka UI — visual dashboard at http://localhost:8090
  # Shows topics, messages, consumer groups in real time
  # -------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: datagate-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: datagate
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - datagate-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
  airflow-init:
      <<: *airflow-common
      container_name: datagate-airflow-init
      entrypoint: /bin/bash
      command:
        - -c
        - |
          airflow db migrate &&
          airflow users create \
            --username admin \
            --firstname DataGate \
            --lastname Admin \
            --role Admin \
            --email admin@datagate.local \
            --password admin
      networks:
        - datagate-net
      restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: datagate-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    networks:
      - datagate-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: datagate-airflow-scheduler
    command: scheduler
    networks:
      - datagate-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped